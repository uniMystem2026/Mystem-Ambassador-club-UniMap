<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | MYSTEM UniMAP</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --c-bg:        #020b14;
      --c-surface:   #041526;
      --c-panel:     #071e35;
      --c-border:    #0d3a5e;
      --c-accent:    #00c8ff;
      --c-accent2:   #00ff9f;
      --c-text:      #d4eaf7;
      --c-muted:     #5a8ca8;
      --font-head:   'Orbitron', sans-serif;
      --font-body:   'Exo 2', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--c-bg); color: var(--c-text); font-family: var(--font-body); display: flex; min-height: 100vh; }
    
    /* Sidebar */
    .sidebar { width: 250px; background: var(--c-surface); border-right: 1px solid var(--c-border); padding: 24px; }
    .brand { font-family: var(--font-head); font-weight: 900; font-size: 18px; color: var(--c-white); margin-bottom: 40px; display: flex; align-items: center; gap: 10px;}
    .nav-link { display: block; padding: 12px 16px; color: var(--c-muted); text-decoration: none; border-radius: 8px; margin-bottom: 8px; font-weight: 600; transition: 0.2s; }
    .nav-link:hover, .nav-link.active { background: #00c8ff15; color: var(--c-accent); }
    .logout { margin-top: auto; color: #ff4d4d; border: 1px solid #ff4d4d33; }
    
    /* Main Content */
    .main-content { flex: 1; padding: 40px; overflow-y: auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid var(--c-border); padding-bottom: 20px; }
    h1 { font-family: var(--font-head); font-size: 28px; }
    
    /* Editor Panel */
    .editor-panel { background: var(--c-panel); border: 1px solid var(--c-border); border-radius: 16px; padding: 30px; max-width: 800px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 12px; color: var(--c-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
    input, textarea { width: 100%; padding: 14px; background: var(--c-bg); border: 1px solid var(--c-border); border-radius: 8px; color: var(--c-text); font-family: var(--font-body); outline: none; transition: 0.3s; }
    input:focus, textarea:focus { border-color: var(--c-accent); box-shadow: 0 0 15px #00c8ff33; }
    
    .btn { padding: 14px 28px; background: var(--c-accent); color: var(--c-bg); font-family: var(--font-head); font-weight: 700; text-transform: uppercase; border-radius: 8px; border: none; cursor: pointer; transition: 0.3s; box-shadow: 0 0 15px #00c8ff88; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 0 25px #00c8ffcc; }
    .success-msg { display: none; margin-top: 15px; color: var(--c-accent2); font-weight: 600; font-size: 14px; }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="brand">M² ADMIN</div>
    <a href="#" class="nav-link active">Home Highlight</a>
    <a href="#" class="nav-link">Manage Events</a>
    <a href="#" class="nav-link">Manage Projects</a>
    <a href="#" class="nav-link">Committee List</a>
    <br><br>
    <a href="index.html" class="nav-link logout">← Logout</a>
  </div>

  <div class="main-content">
    <div class="header">
      <h1>Edit Main Page Highlight</h1>
      <div>Welcome, Executive Admin</div>
    </div>

    <div class="editor-panel">
      <form id="highlightForm">
        <div class="form-group">
          <label>Highlight Badge (Text above title)</label>
          <input type="text" id="badgeText" placeholder="e.g. Latest Announcement" value="Official STEM Ambassador Club · UniMAP">
        </div>
        
        <div class="form-group">
          <label>Main Headline</label>
          <input type="text" id="headlineText" placeholder="Main Title" value="MYSTEM Ambassador Club">
        </div>

        <div class="form-group">
          <label>Sub-Description</label>
          <textarea id="subText" rows="4">Empowering the next generation of STEM leaders through innovation, automation, Industry 4.0 literacy, and community-driven outreach across Malaysia and beyond.</textarea>
        </div>

        <button type="submit" class="btn">Update Front Page</button>
        <div id="successMsg" class="success-msg">✅ Main page updated successfully! Refresh your main site to see changes.</div>
      </form>
    </div>
  </div>

  <script>
    // This script takes the form data and saves it to the browser's local memory
    document.getElementById('highlightForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const badge = document.getElementById('badgeText').value;
      const headline = document.getElementById('headlineText').value;
      const desc = document.getElementById('subText').value;

      // Save to LocalStorage
      localStorage.setItem('mystem_badge', badge);
      localStorage.setItem('mystem_headline', headline);
      localStorage.setItem('mystem_desc', desc);

      // Show success message
      const msg = document.getElementById('successMsg');
      msg.style.display = 'block';
      setTimeout(() => msg.style.display = 'none', 4000);
    });
  </script>
</body>
</html>
