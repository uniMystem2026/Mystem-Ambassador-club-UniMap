<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M² Admin - Committee List</title>
    <style>
        :root {
            --bg-body: #050b14;
            --bg-sidebar: #08111c;
            --bg-card: #0a1929;
            --bg-input: #03070c;
            --text-main: #ffffff;
            --text-muted: #6b8299;
            --accent-cyan: #00d2ff;
            --accent-cyan-hover: #00b8e6;
            --accent-red: #ff4c4c;
            --border-color: #1a2f4c;
            --sidebar-active-bg: #0d2136;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* --- Sidebar Styles --- */
        .sidebar {
            width: 250px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            padding: 0 20px 30px;
            color: var(--text-main);
            letter-spacing: 1px;
        }

        .nav-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .nav-item {
            padding: 12px 20px;
            margin: 0 15px;
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .nav-item:hover {
            color: var(--accent-cyan);
        }

        .nav-item.active {
            background-color: var(--sidebar-active-bg);
            color: var(--accent-cyan);
        }

        .nav-footer {
            margin-top: auto;
            padding: 0 15px;
        }

        .btn-back {
            display: block;
            padding: 12px 20px;
            color: var(--accent-red);
            text-decoration: none;
            font-size: 14px;
            border: 1px solid rgba(255, 76, 76, 0.2);
            border-radius: 8px;
            text-align: left;
            transition: background 0.3s;
        }

        .btn-back:hover {
            background: rgba(255, 76, 76, 0.1);
        }

        /* --- Main Content Styles --- */
        .main-content {
            flex: 1;
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 24px;
            color: var(--text-main);
            letter-spacing: 1px;
        }

        .user-info {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* --- Card Styles --- */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 25px;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .card-header h2 {
            font-size: 16px;
            color: var(--accent-cyan);
            font-weight: 600;
        }

        .card-header.white-text h2 {
            color: var(--text-main);
        }

        /* --- Table Styles --- */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        td {
            padding: 15px 0;
            font-size: 13px;
            color: var(--text-main);
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .member-photo {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background-color: var(--bg-input);
            border: 1px solid var(--accent-cyan);
            display: inline-block;
        }

        .btn-delete {
            background: transparent;
            color: var(--accent-red);
            border: 1px solid rgba(255, 76, 76, 0.4);
            padding: 6px 15px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            background: rgba(255, 76, 76, 0.1);
        }

        /* --- Form Styles --- */
        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-col {
            flex: 1;
        }

        label {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        input[type="text"], 
        input[type="file"] {
            width: 100%;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 15px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-cyan);
        }

        input::placeholder {
            color: #3a4b61;
        }

        .file-upload-wrapper {
            background-color: var(--bg-input);
            border: 1px dashed var(--border-color);
            padding: 8px;
            border-radius: 6px;
            display: flex;
            align-items: center;
        }

        input[type="file"] {
            border: none;
            padding: 0;
            background: transparent;
        }

        input[type="file"]::file-selector-button {
            background-color: #e0e0e0;
            color: #000;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            margin-right: 15px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
        }

        .section-title {
            font-size: 14px;
            color: var(--text-main);
            margin: 25px 0 15px 0;
            font-weight: 600;
        }

        .btn-submit {
            background-color: var(--accent-cyan);
            color: #000000;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: var(--accent-cyan-hover);
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">M² ADMIN</div>
        <ul class="nav-menu">
            <a class="nav-item">Home Highlight</a>
            <a class="nav-item">Manage Events</a>
            <a class="nav-item">Manage Projects</a>
            <a class="nav-item active">Committee List</a>
            <a class="nav-item">Community Stories</a>
        </ul>
        <div class="nav-footer">
            <a href="#" class="btn-back">← Back to Site</a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="header">
            <h1>Committee List</h1>
            <div class="user-info">Welcome, Executive Admin</div>
        </header>

        <!-- Current Members Table Card -->
        <section class="card">
            <div class="card-header">
                <span>📋</span>
                <h2>Current Committee Members</h2>
            </div>
            <table>
                <thead>
                    <tr>
                        <th style="width: 80px;">PHOTO</th>
                        <th>NAME</th>
                        <th>ROLE</th>
                        <th style="text-align: right;">ACTION</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <div class="member-photo"></div>
                        </td>
                        <td>ANAS ZUHAIRI BIN ZULLKEFFLE</td>
                        <td>PRESIDENT</td>
                        <td style="text-align: right;">
                            <button class="btn-delete">DELETE</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>

        <!-- Add Member Form Card -->
        <section class="card">
            <div class="card-header white-text">
                <h2>+ Add Committee Member</h2>
            </div>
            
            <form>
                <div class="form-group">
                    <label>FULL NAME</label>
                    <input type="text">
                </div>

                <div class="form-row">
                    <div class="form-col">
                        <label>ROLE</label>
                        <input type="text" placeholder="e.g. President">
                    </div>
                    <div class="form-col">
                        <label>UPLOAD MEMBER PHOTO</label>
                        <div class="file-upload-wrapper">
                            <input type="file">
                        </div>
                    </div>
                </div>

                <div class="section-title">Social Links (Optional)</div>
                
                <div class="form-row" style="margin-bottom: 10px;">
                    <div class="form-col">
                        <label>INSTAGRAM LINK</label>
                        <input type="text">
                    </div>
                    <div class="form-col">
                        <label>LINKEDIN LINK</label>
                        <input type="text">
                    </div>
                    <div class="form-col">
                        <label>WHATSAPP NUMBER</label>
                        <input type="text">
                    </div>
                </div>

                <button type="submit" class="btn-submit">ADD TO COMMITTEE LIST</button>
            </form>
        </section>
    </main>

</body>
</html>
