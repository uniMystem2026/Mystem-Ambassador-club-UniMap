<!-- ═══════════════ SCRIPTS ═══════════════ -->
<script>
  /* Scroll reveal */
  const reveals = document.querySelectorAll('.reveal');
  const observer = new IntersectionObserver(entries => {
    entries.forEach((e, i) => {
      if (e.isIntersecting) {
        setTimeout(() => e.target.classList.add('visible'), i * 80);
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.12 });
  reveals.forEach(el => observer.observe(el));

  /* Mobile menu */
  function openMobileMenu()  { document.getElementById('mobileMenu').classList.add('open'); }
  function closeMobileMenu() { document.getElementById('mobileMenu').classList.remove('open'); }
  document.getElementById('mobileClose').addEventListener('click', closeMobileMenu);

  /* NEW MAILTO SCRIPT */
  function handleContact() {
    const name = document.getElementById('contactName').value;
    const email = document.getElementById('contactEmail').value;
    const message = document.getElementById('contactMessage').value;

    if (!name || !email || !message) {
      alert('Please fill in all fields before sending your message.');
      return;
    }

    const targetEmail = 'mystemambassador@unimap.edu.my';
    const subject = encodeURIComponent(`Website Inquiry from ${name}`);
    const body = encodeURIComponent(`Name: ${name}\nEmail: ${email}\n\nMessage:\n${message}`);

    window.location.href = `mailto:${targetEmail}?subject=${subject}&body=${body}`;
  }

  /* Active nav link on scroll */
  const sections = document.querySelectorAll('section[id]');
  const navLinks  = document.querySelectorAll('.nav-links a');
  window.addEventListener('scroll', () => {
    let current = '';
    sections.forEach(s => {
      if (window.scrollY >= s.offsetTop - 100) current = s.getAttribute('id');
    });
    navLinks.forEach(a => {
      a.style.color = a.getAttribute('href') === '#' + current ? 'var(--c-accent)' : '';
    });
  });

  /* =======================================================
     EXPERIENCE IMAGE CONVERTER
     ======================================================= */
  function getBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result);
      reader.onerror = error => reject(error);
    });
  }

  /* =======================================================
     EXPERIENCE FORM SUBMISSION
     ======================================================= */
  document.getElementById('experienceForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const name = document.getElementById('expName').value;
    const text = document.getElementById('expText').value;
    const fileInput = document.getElementById('expPhoto');
    
    // Process image if user uploaded one
    let photoBase64 = '';
    if (fileInput.files.length > 0) {
      photoBase64 = await getBase64(fileInput.files[0]);
    }

    // Create the experience object
    const newExp = {
      name: name,
      text: text,
      photo: photoBase64
    };

    // Save to localStorage
    let experiences = JSON.parse(localStorage.getItem('mystem_experiences')) || [];
    experiences.unshift(newExp); // add to the top
    localStorage.setItem('mystem_experiences', JSON.stringify(experiences));
    
    alert('✅ Thank you for sharing your experience! It has been posted to the community wall.');
    this.reset();
    
    // Reload the wall instantly
    loadExperiences(); 
  });

  /* =======================================================
     DYNAMIC CONTENT LOADER (Reads from Admin & Forms)
     ======================================================= */
  
  // Only loads the TOP 3 most recent stories!
  function loadExperiences() {
    const experiences = JSON.parse(localStorage.getItem('mystem_experiences')) || [];
    const container = document.getElementById('experiencesList');
    
    if(experiences.length === 0) {
      container.innerHTML = '<p style="text-align:center; grid-column: 1/-1; color: var(--c-muted); padding: 40px; border: 1px dashed var(--c-border); border-radius: 20px;">No experiences shared yet. Be the first to share your story below!</p>';
      return;
    }
    
    let html = '';
    const recentExperiences = experiences.slice(0, 3);
    
    recentExperiences.forEach(exp => {
      let imgHtml = exp.photo ? `<img src="${exp.photo}" class="exp-photo" alt="Experience Photo">` : '';
      html += `
        <div class="exp-card reveal visible">
          ${imgHtml}
          <div class="exp-text">"${exp.text}"</div>
          <div class="exp-author">— ${exp.name}</div>
        </div>
      `;
    });
    container.innerHTML = html;
  }

  // Load everything when site opens
  window.addEventListener('DOMContentLoaded', () => {
    
    // 1. Load Highlight
    const savedBadge = localStorage.getItem('mystem_badge');
    if(savedBadge) document.querySelector('.hero-badge').innerHTML = `<span class="dot"></span> ${savedBadge}`;
    
    const savedHeadline = localStorage.getItem('mystem_headline');
    if(savedHeadline) document.querySelector('.hero-title').innerHTML = `<span class="line-accent">${savedHeadline}</span><br/><span class="line-green" style="font-size:.38em; letter-spacing:.08em;">UNIVERSITI MALAYSIA PERLIS</span>`;
    
    const savedDesc = localStorage.getItem('mystem_desc');
    if(savedDesc) document.querySelector('.hero-sub').innerText = savedDesc;

    // 2. Load Custom Events
    const events = JSON.parse(localStorage.getItem('mystem_events'));
    if(events && events.length > 0) {
      const eventContainer = document.querySelector('.events-list');
      events.forEach(ev => {
        let html = `
          <div class="event-item reveal visible" style="border-color: var(--c-accent); box-shadow: var(--glow-blue);">
            <div class="event-date"><div class="event-day">${ev.day}</div><div class="event-month">${ev.month}</div></div>
            <div class="event-info">
              <div class="event-type">${ev.type}</div>
              <div class="event-title">${ev.title}</div>
              <div class="event-loc">${ev.loc}</div>
            </div>
            <span class="event-status status-${ev.status}">${ev.status}</span>
          </div>`;
        eventContainer.insertAdjacentHTML('afterbegin', html);
      });
    }

    // 3. Load Custom Projects
    const projects = JSON.parse(localStorage.getItem('mystem_projects'));
    if(projects && projects.length > 0) {
      const projectContainer = document.querySelector('.projects-grid');
      projects.forEach(proj => {
        let html = `
          <div class="proj-card reveal visible" style="border-color: var(--c-accent2);">
            <div class="proj-banner" style="background:linear-gradient(135deg,#041526,#0a3d62);">${proj.icon}</div>
            <div class="proj-body">
              <div class="proj-meta">
                <span class="proj-badge">${proj.badge}</span>
                <span class="proj-year">${proj.year}</span>
              </div>
              <h3 class="proj-title">${proj.title}</h3>
              <p class="proj-desc">${proj.desc}</p>
            </div>
          </div>`;
        projectContainer.insertAdjacentHTML('afterbegin', html);
      });
    }

    // 4. Load Custom Committee Members WITH SOCIAL LINKS & NEW AVATAR PHOTOS
    const committee = JSON.parse(localStorage.getItem('mystem_committee'));
    if(committee && committee.length > 0) {
      const teamContainer = document.querySelector('.team-grid');
      committee.forEach(member => {
        
        let socialHtml = '';
        if (member.ig || member.li || member.wa) {
          socialHtml += `<div class="team-social">`;
          if (member.ig) socialHtml += `<a href="${member.ig}" target="_blank" class="social-btn" title="Instagram">📸</a>`;
          if (member.li) socialHtml += `<a href="${member.li}" target="_blank" class="social-btn" title="LinkedIn">💼</a>`;
          if (member.wa) {
             let cleanNum = member.wa.replace(/[^0-9]/g, '');
             if (cleanNum.startsWith('0')) cleanNum = '6' + cleanNum;
             socialHtml += `<a href="https://wa.me/${cleanNum}" target="_blank" class="social-btn" title="WhatsApp">💬</a>`;
          }
          socialHtml += `</div>`;
        }

        // THE FIX: Check if there is an uploaded photo. If so, display it in a perfect circle!
        let avatarContent = '';
        if (member.photo) {
          avatarContent = `<img src="${member.photo}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;" alt="${member.name}">`;
        } else if (member.icon) {
          avatarContent = member.icon; // Fallback to old text emoji if it exists
        } else {
          avatarContent = '👤'; // Fallback if totally empty
        }

        let html = `
          <div class="team-card reveal visible" style="border-color: var(--c-gold);">
            <div class="team-avatar" style="background:linear-gradient(135deg,#ffd16622,#ffd16644); padding: 0;">
              ${avatarContent}
            </div>
            <div class="team-name">${member.name}</div>
            <div class="team-role">${member.role}</div>
            <div class="team-dept">MYSTEM UniMAP</div>
            ${socialHtml}
          </div>`;
        teamContainer.insertAdjacentHTML('afterbegin', html);
      });
    }

    // 5. Load the Community Wall
    loadExperiences();

  });
</script>
