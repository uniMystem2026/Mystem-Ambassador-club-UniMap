<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>STEM Games | MYSTEM Ambassador Club</title>
  
  <!-- Your Logo for the Browser Tab -->
  <link rel="icon" type="image/png" href="WhatsApp_Image_2024-12-02_at_15.29.32-removebg-preview.png" />
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet" />
  
  <style>
    /* ─── CSS Variables (Matching your main theme) ─── */
    :root {
      --c-bg:        #020b14;
      --c-surface:   #041526;
      --c-panel:     #071e35;
      --c-border:    #0d3a5e;
      --c-accent:    #00c8ff;
      --c-accent2:   #00ff9f;
      --c-gold:      #ffd166;
      --c-text:      #d4eaf7;
      --c-muted:     #5a8ca8;
      --c-white:     #ffffff;
      --font-head:   'Orbitron', sans-serif;
      --font-body:   'Exo 2', sans-serif;
      --glow-blue:   0 0 18px #00c8ff88, 0 0 40px #00c8ff33;
      --glow-green:  0 0 18px #00ff9f88, 0 0 40px #00ff9f33;
    }

    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--c-bg);
      color: var(--c-text);
      font-family: var(--font-body);
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }

    /* ─── Noise & Grid Background ─── */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
    }
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 0;
      background-image: linear-gradient(var(--c-border) 1px, transparent 1px), linear-gradient(90deg, var(--c-border) 1px, transparent 1px);
      background-size: 40px 40px; opacity: 0.06; pointer-events: none;
    }

    /* ─── Animated background orbs ─── */
    .bg-orb {
      position: fixed; border-radius: 50%;
      filter: blur(90px); opacity: 0.1;
      pointer-events: none; z-index: 0;
      animation: orb-drift 14s ease-in-out infinite alternate;
    }
    .bg-orb-1 { width: 400px; height: 400px; background: var(--c-accent);  top: -150px; left: -150px; animation-duration: 16s; }
    .bg-orb-2 { width: 350px; height: 350px; background: var(--c-accent2); bottom: -100px; right: -100px; animation-duration: 12s; animation-delay: -6s; }
    @keyframes orb-drift { from { transform: translate(0, 0) scale(1); } to { transform: translate(30px, 20px) scale(1.08); } }

    .z1 { position: relative; z-index: 1; }

    /* ─── NAV ─── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 0 16px;
      background: linear-gradient(180deg, #020b14f0 0%, transparent 100%);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid #0d3a5e44;
    }
    @media (min-width: 768px) { nav { padding: 0 32px; } }
    
    .nav-inner {
      max-width: 1180px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }
    @media (min-width: 768px) { .nav-inner { height: 70px; } }
    
    .nav-logo { display: flex; align-items: center; gap: 8px; }
    .nav-logo img { height: 34px; width: auto; object-fit: contain; }
    @media (min-width: 768px) { .nav-logo img { height: 42px; } }
    
    .logo-text { font-family: var(--font-head); font-size: 13px; font-weight: 700; letter-spacing: .05em; }
    .logo-text span { display: block; font-size: 9px; font-weight: 400; color: var(--c-muted); letter-spacing: .10em; margin-top: 1px; }
    @media (min-width: 768px) { .logo-text { font-size: 15px; } .logo-text span { font-size: 10px; } }
    
    .nav-links { display: flex; align-items: center; gap: 28px; }
    
    .btn-return {
      font-family: var(--font-head); font-size: 10px; letter-spacing: .1em; 
      text-transform: uppercase; color: var(--c-accent); 
      transition: all .3s ease; border: 1px solid var(--c-accent);
      padding: 8px 16px; border-radius: 20px; background: rgba(0, 200, 255, 0.05);
    }
    @media (min-width: 768px) { .btn-return { font-size: 11px; } }
    .btn-return:hover { background: rgba(0, 200, 255, 0.15); box-shadow: var(--glow-blue); }

    /* ─── BLANK GAMES SPACE ─── */
    .games-container {
      flex: 1; /* Pushes footer down */
      padding: 150px 24px 80px;
      max-width: 1180px;
      margin: 0 auto;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: fade-up 1s ease both;
    }
    
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    
    .games-title {
      font-family: var(--font-head);
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 900;
      color: var(--c-accent);
      text-shadow: var(--glow-blue);
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    .games-placeholder {
      border: 2px dashed var(--c-border);
      border-radius: 20px;
      background: rgba(7, 30, 53, 0.5);
      padding: 60px 20px;
      max-width: 800px;
      width: 100%;
      color: var(--c-muted);
      font-size: 16px;
      backdrop-filter: blur(10px);
      transition: border-color 0.3s ease;
    }
    @media (min-width: 768px) { .games-placeholder { font-size: 18px; padding: 60px; } }
    
    .games-placeholder:hover {
      border-color: var(--c-accent);
    }

    /* ─── FOOTER ─── */
    footer {
      background: var(--c-bg); border-top: 1px solid var(--c-border);
      padding: 40px 24px 24px;
      text-align: center;
    }
    .footer-copy { font-size: 12px; color: var(--c-muted); }
  </style>
</head>
<body>

<!-- Background Orbs -->
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<!-- ═══════════════ NAV ═══════════════ -->
<nav class="z1">
  <div class="nav-inner">
    <!-- Clicking the logo safely returns to main page -->
    <a href="index.html" class="nav-logo" onclick="window.location.href='index.html'; return false;">
      <img src="WhatsApp_Image_2024-12-02_at_15.29.32-removebg-preview.png" alt="MY STEM Logo">
      <img src="LogoUniMAP2017.png" alt="UniMAP Logo" style="margin-left:6px;">
      <div class="logo-text" style="margin-left:6px;">
        MY STEM
        <span>Ambassador · UniMAP</span>
      </div>
    </a>
    <div class="nav-links">
      <!-- Safely returns to main page -->
      <a href="index.html" class="btn-return" onclick="window.location.href='index.html'; return false;">← Back to Main Site</a>
    </div>
  </div>
</nav>

<!-- ═══════════════ BLANK GAMES SPACE ═══════════════ -->
<main class="games-container z1">
    <h1 class="games-title">STEM EDUCATION GAMES</h1>
    
    <div class="games-placeholder">
        <div style="font-size: 50px; margin-bottom: 20px; animation: bounce 2s ease infinite;">🎮</div>
        <p>Interactive STEM Education Games are currently under development.</p>
        <p style="font-size: 14px; margin-top: 10px; color: var(--c-accent2); font-weight: 600; letter-spacing: 1px;">CHECK BACK SOON!</p>
    </div>
</main>

<style>
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
</style>

<!-- ═══════════════ FOOTER ═══════════════ -->
<footer class="z1">
  <div class="footer-copy">© 2025 MYSTEM Ambassador Club, Universiti Malaysia Perlis. All rights reserved.</div>
</footer>

</body>
</html>
