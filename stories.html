<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community Wall | MYSTEM UniMAP</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --c-bg:        #020b14;
      --c-surface:   #041526;
      --c-panel:     #071e35;
      --c-border:    #0d3a5e;
      --c-accent:    #00c8ff;
      --c-accent2:   #00ff9f;
      --c-gold:      #ffd166;
      --c-text:      #d4eaf7;
      --c-muted:     #5a8ca8;
      --c-white:     #ffffff;
      --font-head:   'Orbitron', sans-serif;
      --font-body:   'Exo 2', sans-serif;
      --glow-blue:   0 0 18px #00c8ff88, 0 0 40px #00c8ff33;
    }
    
    /* Base styles */
    body { background: var(--c-bg); color: var(--c-text); font-family: var(--font-body); margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }
    a { text-decoration: none; color: inherit; }
    * { box-sizing: border-box; }

    /* Background Effects */
    body::after {
      content: ''; position: fixed; inset: 0; z-index: -2;
      background-image: linear-gradient(var(--c-border) 1px, transparent 1px), linear-gradient(90deg, var(--c-border) 1px, transparent 1px);
      background-size: 60px 60px; opacity: 0.05; pointer-events: none;
    }
    .bg-glow {
      position: fixed; width: 600px; height: 600px; background: var(--c-accent);
      border-radius: 50%; filter: blur(120px); opacity: 0.08; top: -200px; left: 50%; transform: translateX(-50%); z-index: -1;
    }

    /* Navbar */
    nav { padding: 20px 40px; border-bottom: 1px solid var(--c-border); background: #041526f0; backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100;}
    .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .back-btn { font-family: var(--font-head); font-size: 12px; color: var(--c-accent); text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; display: flex; align-items: center; gap: 8px;}
    .back-btn:hover { color: var(--c-white); text-shadow: var(--glow-blue); }
    .nav-brand { font-family: var(--font-head); font-weight: 700; font-size: 16px; color: var(--c-white); letter-spacing: 0.05em; }

    /* Header */
    header { text-align: center; padding: 80px 20px 40px; }
    .tag { display: inline-block; padding: 6px 16px; border: 1px solid var(--c-accent2); border-radius: 50px; font-family: var(--font-head); font-size: 11px; color: var(--c-accent2); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; box-shadow: 0 0 15px #00ff9f33; }
    h1 { font-family: var(--font-head); font-size: clamp(32px, 5vw, 56px); margin: 0 0 15px; color: var(--c-white); }
    p.sub { color: var(--c-muted); max-width: 600px; margin: 0 auto; line-height: 1.6; font-size: 16px; }

    /* Grid layout for stories */
    .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px 100px; }
    .masonry-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 30px;
      align-items: start;
    }

    /* Individual Story Cards */
    .story-card {
      background: linear-gradient(145deg, var(--c-panel), #05101a);
      border: 1px solid var(--c-border);
      border-radius: 20px;
      padding: 24px;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .story-card::before {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
      background: linear-gradient(90deg, var(--c-accent), var(--c-accent2));
      opacity: 0; transition: 0.3s;
    }
    .story-card:hover { transform: translateY(-5px); border-color: var(--c-accent); box-shadow: var(--glow-blue); }
    .story-card:hover::before { opacity: 1; }
    
    .story-photo { width: 100%; height: 240px; object-fit: cover; border-radius: 12px; margin-bottom: 24px; border: 1px solid #ffffff10; background: var(--c-surface); }
    .story-text { font-size: 15px; line-height: 1.8; color: var(--c-text); margin-bottom: 24px; font-style: italic; position: relative; z-index: 1;}
    
    /* Cool giant quote mark */
    .story-text::before { content: '"'; font-family: var(--font-head); font-size: 60px; color: var(--c-accent); position: absolute; top: -20px; left: -10px; opacity: 0.2; z-index: -1; }
    
    .story-author { font-family: var(--font-head); font-size: 13px; font-weight: 700; color: var(--c-accent2); text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .story-author::before { content: ''; width: 20px; height: 2px; background: var(--c-accent2); display: inline-block; }

    /* ACTION BUTTONS (LIKE & SHARE) */
    .story-actions {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: auto; padding-top: 15px; border-top: 1px solid #ffffff10;
    }
    .icon-btn {
      background: none; border: none; color: var(--c-muted); cursor: pointer;
      display: flex; align-items: center; gap: 6px; font-family: var(--font-body); 
      font-size: 13px; font-weight: 600; transition: 0.3s; outline: none;
    }
    .icon-btn:hover { color: var(--c-accent); }
    .icon-btn.liked { color: #ff4d4d; }
    .icon-btn span { font-size: 16px; }

    /* Empty state if no stories */
    .empty-state { text-align: center; padding: 60px 20px; grid-column: 1 / -1; border: 1px dashed var(--c-border); border-radius: 20px; background: var(--c-panel); }
    .empty-state h3 { font-family: var(--font-head); color: var(--c-white); margin-bottom: 10px; }

    /* Toast Notification */
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--c-accent2); color: var(--c-bg); padding: 12px 24px; border-radius: 50px;
      font-family: var(--font-head); font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <!-- Ambient glow in background -->
  <div class="bg-glow"></div>

  <!-- Toast Notification Popup -->
  <div id="toast" class="toast">Link copied to clipboard!</div>

  <!-- Navigation -->
  <nav>
    <div class="nav-inner">
      <a href="index.html" class="back-btn">← Back to Main Site</a>
      <div class="nav-brand">MYSTEM UniMAP</div>
    </div>
  </nav>

  <!-- Header -->
  <header>
    <div class="tag">Community Wall</div>
    <h1>Shared Experiences</h1>
    <p class="sub">Discover the journeys, projects, and memories shared by the incredible members of the MYSTEM Ambassador Club.</p>
  </header>

  <!-- Stories Container -->
  <div class="container">
    <div class="masonry-grid" id="storiesGrid">
      <!-- Stories are automatically injected here by the script below -->
    </div>
  </div>

  <script>
    /* --- LOAD STORIES AND BUTTONS --- */
    function loadStories() {
      const experiences = JSON.parse(localStorage.getItem('mystem_experiences')) || [];
      const grid = document.getElementById('storiesGrid');
      
      if(experiences.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <h3>No Stories Yet 🚀</h3>
            <p style="color: var(--c-muted);">Be the first to share your experience on the main page!</p>
          </div>`;
        return;
      }
      
      let html = '';
      experiences.forEach((exp, index) => {
        let imgHtml = exp.photo ? `<img src="${exp.photo}" class="story-photo" alt="Member Photo">` : '';
        
        // Setup initial likes if they don't exist yet
        let likes = exp.likes || 0;
        let isLiked = exp.isLiked || false;
        let heartIcon = isLiked ? '❤️' : '🤍';
        let likedClass = isLiked ? 'liked' : '';

        html += `
          <div class="story-card">
            ${imgHtml}
            <div class="story-text">${exp.text}</div>
            <div class="story-author">${exp.name}</div>
            
            <div class="story-actions">
              <button class="icon-btn ${likedClass}" onclick="toggleLike(this, ${index})">
                <span class="heart-icon">${heartIcon}</span> 
                <span class="like-count" style="margin-left: 2px;">${likes}</span>
              </button>
              
              <button class="icon-btn share-btn" onclick="shareStory()">
                <span>🔗</span> Share
              </button>
            </div>
          </div>
        `;
      });
      grid.innerHTML = html;
    }

    /* --- TOGGLE LIKE FUNCTION --- */
    window.toggleLike = function(btn, index) {
      let experiences = JSON.parse(localStorage.getItem('mystem_experiences')) || [];
      let exp = experiences[index];

      // Ensure properties exist
      if (typeof exp.likes === 'undefined') exp.likes = 0;
      if (typeof exp.isLiked === 'undefined') exp.isLiked = false;

      // Toggle logic
      if (!exp.isLiked) {
        exp.likes++;
        exp.isLiked = true;
        btn.classList.add('liked');
        btn.querySelector('.heart-icon').innerText = '❤️';
      } else {
        exp.likes--;
        exp.isLiked = false;
        btn.classList.remove('liked');
        btn.querySelector('.heart-icon').innerText = '🤍';
      }
      
      // Update the number on screen
      btn.querySelector('.like-count').innerText = exp.likes;
      
      // Save back to local storage
      localStorage.setItem('mystem_experiences', JSON.stringify(experiences));
    };

    /* --- SHARE (COPY LINK) FUNCTION --- */
    window.shareStory = function() {
      // Copies the current page URL to the user's clipboard
      navigator.clipboard.writeText(window.location.href).then(() => {
        // Show the pop-up notification
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        
        // Hide the pop-up after 3 seconds
        setTimeout(() => toast.classList.remove('show'), 3000);
      });
    };

    // Initialize the page on load
    window.addEventListener('DOMContentLoaded', loadStories);
  </script>
</body>
</html>
